<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="@keelstack/guard demo">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&amp;display=swap');
      .window { fill: #0d0d0f; rx: 10; }
      .title-bar { fill: #1a1a1e; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #febc2e; }
      .dot-g { fill: #28c840; }
      .prompt { fill: #5a5760; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
      .cmd { fill: #e2ddd8; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
      .kw { fill: #c792ea; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
      .str { fill: #c3e88d; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
      .fn { fill: #82aaff; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
      .amber { fill: #e8a820; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
      .green { fill: #3ddc84; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
      .red { fill: #ff5f5f; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
      .dim { fill: #5a5760; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
      .tmpl { fill: #89ddff; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }
      .comment { fill: #4a4858; font-style: italic; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 12px; }

      /* Line appear animations */
      .l1  { opacity: 0; animation: appear 0.01s 0.4s forwards; }
      .l2  { opacity: 0; animation: appear 0.01s 0.8s forwards; }
      .l3  { opacity: 0; animation: appear 0.01s 1.1s forwards; }
      .l4  { opacity: 0; animation: appear 0.01s 1.4s forwards; }
      .l5  { opacity: 0; animation: appear 0.01s 1.7s forwards; }
      .l6  { opacity: 0; animation: appear 0.01s 2.0s forwards; }
      .l7  { opacity: 0; animation: appear 0.01s 2.3s forwards; }
      .l8  { opacity: 0; animation: appear 0.01s 2.6s forwards; }
      .l9  { opacity: 0; animation: appear 0.01s 3.0s forwards; }
      .l10 { opacity: 0; animation: appear 0.01s 3.3s forwards; }
      .l11 { opacity: 0; animation: appear 0.01s 3.6s forwards; }
      .l12 { opacity: 0; animation: appear 0.01s 3.9s forwards; }
      .l13 { opacity: 0; animation: appear 0.01s 4.4s forwards; }
      .l14 { opacity: 0; animation: appear 0.01s 4.8s forwards; }
      .l15 { opacity: 0; animation: appear 0.01s 5.2s forwards; }
      .l16 { opacity: 0; animation: appear 0.01s 5.6s forwards; }
      .l17 { opacity: 0; animation: appear 0.01s 6.0s forwards; }

      /* Status badge animations */
      .badge-exec  { opacity: 0; animation: badgeIn 0.3s 3.9s ease forwards; }
      .badge-replay{ opacity: 0; animation: badgeIn 0.3s 5.2s ease forwards; }
      .badge-block { opacity: 0; animation: badgeIn 0.3s 6.0s ease forwards; }

      /* Cursor blink */
      .cursor { animation: blink 1s 6.5s infinite; fill: #e8a820; }

      @keyframes appear {
        to { opacity: 1; }
      }
      @keyframes badgeIn {
        from { opacity: 0; transform: translateX(-4px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Window frame -->
  <rect width="720" height="420" rx="10" fill="#0d0d0f"/>
  <!-- Title bar -->
  <rect width="720" height="36" rx="10" fill="#1a1a1e"/>
  <rect y="26" width="720" height="10" fill="#1a1a1e"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- Title -->
  <text x="360" y="23" text-anchor="middle" fill="#5a5760" font-family="'Fira Code', monospace" font-size="12">@keelstack/guard — demo</text>

  <!-- SECTION 1: IMPORT -->
  <!-- Line 1: import -->
  <g class="l1">
    <text x="20" y="70" class="kw">import</text>
    <text x="66" y="70" class="cmd"> { guard } </text>
    <text x="148" y="70" class="kw">from</text>
    <text x="180" y="70" class="str"> '@keelstack/guard'</text>
    <text x="312" y="70" class="dim">;</text>
  </g>

  <!-- Line 2: blank -->
  <!-- Line 3: comment — idempotency -->
  <g class="l2">
    <text x="20" y="102" class="comment">// — 1. Idempotency: agent retries sendEmail(). Runs once.</text>
  </g>

  <!-- Line 4: const result = await guard({ -->
  <g class="l3">
    <text x="20" y="120" class="kw">const </text>
    <text x="62" y="120" class="amber">result</text>
    <text x="110" y="120" class="cmd"> = </text>
    <text x="128" y="120" class="kw">await </text>
    <text x="172" y="120" class="fn">guard</text>
    <text x="202" y="120" class="dim">({</text>
  </g>

  <!-- Line 5: key -->
  <g class="l4">
    <text x="36" y="138" class="cmd">key</text>
    <text x="60" y="138" class="dim">: </text>
    <text x="72" y="138" class="tmpl">`send-email:</text>
    <text x="162" y="138" class="dim">${</text>
    <text x="180" y="138" class="amber">userId</text>
    <text x="216" y="138" class="dim">}</text>
    <text x="224" y="138" class="tmpl">`</text>
    <text x="232" y="138" class="dim">,</text>
  </g>

  <!-- Line 6: action -->
  <g class="l5">
    <text x="36" y="156" class="cmd">action</text>
    <text x="84" y="156" class="dim">: () =&gt; </text>
    <text x="130" y="156" class="fn">resend</text>
    <text x="166" y="156" class="dim">.</text>
    <text x="170" y="156" class="fn">emails</text>
    <text x="206" y="156" class="dim">.</text>
    <text x="210" y="156" class="fn">send</text>
    <text x="234" y="156" class="dim">({ to: user.email }),</text>
  </g>

  <!-- Line 7: }); -->
  <g class="l6">
    <text x="20" y="174" class="dim">});</text>
  </g>

  <!-- Result badge 1: executed -->
  <g class="badge-exec">
    <rect x="20" y="185" width="680" height="22" rx="4" fill="rgba(61,220,132,0.06)" stroke="rgba(61,220,132,0.2)" stroke-width="1"/>
    <text x="30" y="200" class="green">▸</text>
    <text x="46" y="200" fill="#5a5760" font-family="'Fira Code',monospace" font-size="11">result.status</text>
    <text x="140" y="200" fill="#5a5760" font-family="'Fira Code',monospace" font-size="11"> = </text>
    <text x="160" y="200" fill="#3ddc84" font-family="'Fira Code',monospace" font-size="11" font-weight="600">"executed"</text>
    <text x="240" y="200" fill="#5a5760" font-family="'Fira Code',monospace" font-size="11">  // action ran, result cached</text>
  </g>

  <!-- SECTION 2: RETRY -->
  <g class="l9">
    <text x="20" y="232" class="comment">// — Agent retries with same key (timeout, crash, loop)…</text>
  </g>

  <g class="l10">
    <text x="20" y="250" class="kw">const </text>
    <text x="62" y="250" class="amber">retry</text>
    <text x="98" y="250" class="cmd"> = </text>
    <text x="116" y="250" class="kw">await </text>
    <text x="160" y="250" class="fn">guard</text>
    <text x="190" y="250" class="dim">({</text>
    <text x="204" y="250" class="cmd"> key</text>
    <text x="228" y="250" class="dim">: </text>
    <text x="238" y="250" class="tmpl">`send-email:</text>
    <text x="328" y="250" class="dim">${</text>
    <text x="346" y="250" class="amber">userId</text>
    <text x="382" y="250" class="dim">}</text>
    <text x="390" y="250" class="tmpl">`</text>
    <text x="398" y="250" class="dim">, ... });</text>
  </g>

  <!-- Result badge 2: replayed -->
  <g class="badge-replay">
    <rect x="20" y="261" width="680" height="22" rx="4" fill="rgba(232,168,32,0.06)" stroke="rgba(232,168,32,0.25)" stroke-width="1"/>
    <text x="30" y="276" class="amber">▸</text>
    <text x="46" y="276" fill="#5a5760" font-family="'Fira Code',monospace" font-size="11">retry.status</text>
    <text x="130" y="276" fill="#5a5760" font-family="'Fira Code',monospace" font-size="11"> = </text>
    <text x="150" y="276" fill="#e8a820" font-family="'Fira Code',monospace" font-size="11" font-weight="600">"replayed"</text>
    <text x="228" y="276" fill="#5a5760" font-family="'Fira Code',monospace" font-size="11">  // email NOT sent again. cached result returned.</text>
  </g>

  <!-- SECTION 3: BUDGET BLOCK -->
  <g class="l13">
    <text x="20" y="308" class="comment">// — 2. Budget: hard block when per-user AI spend is exceeded</text>
  </g>
  <g class="l14">
    <text x="20" y="326" class="kw">const </text>
    <text x="62" y="326" class="amber">r</text>
    <text x="74" y="326" class="cmd"> = </text>
    <text x="92" y="326" class="kw">await </text>
    <text x="136" y="326" class="fn">guard</text>
    <text x="166" y="326" class="dim">({ key, action, </text>
    <text x="300" y="326" class="cmd">budget</text>
    <text x="342" y="326" class="dim">: {</text>
    <text x="360" y="326" class="cmd"> id</text>
    <text x="378" y="326" class="dim">:</text>
    <text x="384" y="326" class="amber">userId</text>
    <text x="420" y="326" class="dim">,</text>
    <text x="428" y="326" class="cmd"> limitUsd</text>
    <text x="496" y="326" class="dim">:</text>
    <text x="502" y="326" fill="#f78c6c" font-family="'Fira Code',monospace" font-size="12">2.00</text>
    <text x="530" y="326" class="dim">} });</text>
  </g>

  <!-- Result badge 3: blocked -->
  <g class="badge-block">
    <rect x="20" y="337" width="680" height="22" rx="4" fill="rgba(255,95,95,0.06)" stroke="rgba(255,95,95,0.25)" stroke-width="1"/>
    <text x="30" y="352" class="red">▸</text>
    <text x="46" y="352" fill="#5a5760" font-family="'Fira Code',monospace" font-size="11">r.status</text>
    <text x="104" y="352" fill="#5a5760" font-family="'Fira Code',monospace" font-size="11"> = </text>
    <text x="124" y="352" fill="#ff5f5f" font-family="'Fira Code',monospace" font-size="11" font-weight="600">"blocked:budget"</text>
    <text x="248" y="352" fill="#5a5760" font-family="'Fira Code',monospace" font-size="11">  // action NOT executed. API call never made.</text>
  </g>

  <!-- Cursor -->
  <g class="l17">
    <text x="20" y="392" class="dim">$</text>
    <text x="30" y="392" class="cmd"> </text>
    <rect x="36" y="380" width="8" height="14" class="cursor"/>
  </g>

  <!-- Bottom label -->
  <text x="360" y="412" text-anchor="middle" fill="#2e2e36" font-family="'Fira Code',monospace" font-size="10">npm install @keelstack/guard · MIT · 0 deps · guard.keelstack.me</text>
</svg>
